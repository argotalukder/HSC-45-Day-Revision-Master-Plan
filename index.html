<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Smart Roadmap V3.0 | Gamified</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ── CSS Variables & Dark Theme ── */
        :root {
            --bg-main: #09090b;
            --bg-card: #18181b;
            --bg-hover: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --secondary: #3b82f6;
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #27272a;
            --xp-color: #fbbf24;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            line-height: 1.6; 
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ── Header & Gamification Bar ── */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .brand { font-size: 22px; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .game-stats { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .stat-badge {
            background: var(--bg-card); border: 1px solid var(--border); padding: 8px 15px; border-radius: 12px;
            display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .streak-icon { color: var(--danger); font-size: 18px; animation: pulse 2s infinite; }
        .xp-icon { color: var(--xp-color); font-size: 18px; }
        
        /* Level Bar */
        .level-wrapper { display: flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border); }
        .lvl-text { font-weight: 800; color: var(--primary); font-size: 14px; }
        .lvl-bar-bg { width: 100px; height: 8px; background: var(--bg-main); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
        .lvl-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.5s ease-out; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* ── Container ── */
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        /* ── Dashboard Progress ── */
        .dashboard {
            background: var(--bg-card); border-radius: 20px; padding: 25px; margin-bottom: 30px;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center; position: relative; overflow: hidden;
        }
        .dashboard::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 60%); opacity: 0.1; pointer-events: none;
        }
        .dash-title { font-size: 18px; color: var(--text-muted); margin-bottom: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .progress-container { margin: 20px 0; }
        .main-prog-bg { height: 20px; background: var(--bg-main); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .main-prog-fill { height: 100%; background: linear-gradient(90deg, var(--success), #34d399); width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .main-prog-fill::after { content:''; position: absolute; top:0; left:0; right:0; bottom:0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shimmer 2s infinite; }
        .prog-text { font-size: 28px; font-weight: 800; margin-top: 10px; color: var(--text-main); }
        .dash-stats { display: flex; justify-content: center; gap: 40px; margin-top: 20px; flex-wrap: wrap; }
        .dash-stat-item h4 { font-size: 32px; color: var(--primary); margin-bottom: 5px; }
        .dash-stat-item p { font-size: 13px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }

        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* ── Subject Legend ── */
        .section-title { font-size: 20px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .legend-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; background: var(--bg-card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; }
        .legend-color { width: 12px; height: 12px; border-radius: 50%; }

        /* ── Achievements Badges ── */
        .badges-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .badge-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 15px 10px; text-align: center;
            transition: all 0.3s ease; position: relative; cursor: help; filter: grayscale(1) opacity(0.5);
        }
        .badge-card.unlocked { filter: grayscale(0) opacity(1); border-color: var(--primary); background: linear-gradient(180deg, rgba(139, 92, 246, 0.1), transparent); box-shadow: 0 4px 15px var(--primary-glow); transform: translateY(-3px); }
        .badge-icon { font-size: 36px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .badge-card.unlocked .badge-icon { filter: drop-shadow(0 0 15px var(--primary)); animation: float 3s ease-in-out infinite; }
        .badge-name { font-size: 13px; font-weight: 800; color: var(--text-main); margin-bottom: 5px; }
        .badge-req { font-size: 11px; color: var(--text-muted); }
        
        /* Tooltip */
        .badge-card::after {
            content: attr(data-tooltip); position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--text-main); color: var(--bg-main); font-size: 12px; font-weight: 600; padding: 6px 12px;
            border-radius: 6px; white-space: nowrap; opacity: 0; visibility: hidden; transition: 0.2s; pointer-events: none; z-index: 10;
        }
        .badge-card:hover::after { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* ── Roadmap List ── */
        .roadmap-list { display: flex; flex-direction: column; gap: 15px; }
        .day-card {
            background: var(--bg-card); border-radius: 16px; padding: 20px; display: flex; gap: 20px; align-items: center;
            border: 1px solid var(--border); border-left: 6px solid var(--border); cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .day-card:hover { transform: translateX(5px); background: var(--bg-hover); border-color: var(--text-muted); }
        
        /* Completed State */
        .day-card.completed { background: rgba(24, 24, 27, 0.6); border-color: var(--success) !important; opacity: 0.7; }
        .day-card.completed:hover { transform: none; background: rgba(24, 24, 27, 0.8); }
        .day-card.completed .day-topic { text-decoration: line-through; color: var(--text-muted); }
        
        .check-circle {
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--text-muted);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.3s; background: var(--bg-main);
        }
        .day-card.completed .check-circle { background: var(--success); border-color: var(--success); box-shadow: 0 0 15px var(--success-glow); }
        .day-card.completed .check-circle::after { content: '✔'; color: #fff; font-size: 16px; font-weight: 900; }

        .day-info { flex: 1; }
        .day-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
        .day-num { font-size: 14px; font-weight: 800; background: var(--bg-main); padding: 4px 10px; border-radius: 8px; color: var(--text-main); border: 1px solid var(--border); }
        .day-date { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
        .day-subj-badge { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .day-topic { font-size: 15px; color: var(--text-main); line-height: 1.5; font-weight: 400; }

        /* ── XP Floating Animation ── */
        .xp-float {
            position: fixed; color: var(--xp-color); font-weight: 900; font-size: 24px; pointer-events: none;
            z-index: 9999; animation: floatUpXP 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.6);
        }
        @keyframes floatUpXP {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -20px) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -80px) scale(1); opacity: 0; }
        }

        /* ── Toast Notification ── */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--bg-card); color: #fff; padding: 12px 25px; border-radius: 30px;
            font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 1px solid var(--primary);
            z-index: 1000; opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex; align-items: center; gap: 10px;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @media(max-width: 600px) {
            .dash-stats { gap: 20px; }
            .dash-stat-item h4 { font-size: 24px; }
            .day-card { flex-direction: column; align-items: flex-start; gap: 15px; padding: 15px; }
            .check-circle { position: absolute; top: 15px; right: 15px; }
        }
    </style>
</head>
<body>

    <!-- Top Navigation / Gamification Status -->
    <nav class="top-nav">
        <div class="brand">🚀 MasterPlan</div>
        <div class="game-stats">
            <div class="stat-badge"><span class="streak-icon">🔥</span> <span id="nav-streak">0</span> Day Streak</div>
            <div class="level-wrapper">
                <span class="lvl-text">LVL <span id="nav-lvl">1</span></span>
                <div class="lvl-bar-bg"><div class="lvl-bar-fill" id="nav-lvl-fill"></div></div>
                <span style="font-size: 12px; font-weight: 600; color: var(--text-muted);"><span id="nav-xp">0</span> XP</span>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <!-- Dashboard Section -->
        <div class="dashboard">
            <div class="dash-title">🎯 Mission Progress</div>
            <div class="progress-container">
                <div class="main-prog-bg"><div class="main-prog-fill" id="dash-prog-fill"></div></div>
                <div class="prog-text"><span id="dash-pct">0</span>%</div>
            </div>
            <div class="dash-stats">
                <div class="dash-stat-item">
                    <h4 id="stat-done">0</h4>
                    <p>Completed</p>
                </div>
                <div class="dash-stat-item">
                    <h4 id="stat-left">55</h4>
                    <p>Remaining</p>
                </div>
                <div class="dash-stat-item">
                    <h4 id="stat-total">55</h4>
                    <p>Total Days</p>
                </div>
            </div>
        </div>

        <!-- Subject Legend -->
        <h2 class="section-title">🎨 Subject Keys</h2>
        <div class="legend-container" id="legend-container">
            <!-- Injected via JS -->
        </div>

        <!-- Achievements Section -->
        <h2 class="section-title">🏆 Achievements & Badges</h2>
        <div class="badges-grid" id="badges-container">
            <!-- Injected via JS -->
        </div>

        <!-- Roadmap List -->
        <h2 class="section-title">🗺️ 55-Day Roadmap</h2>
        <div class="roadmap-list" id="roadmap-container">
            <!-- Injected via JS -->
        </div>

    </div>

    <!-- Toast -->
    <div id="toast"></div>

<script>
    // ════════════════════════════════════════════
    // DATA GENERATION & CONSTANTS
    // ════════════════════════════════════════════
    
    // Original 10 days provided by user
    const baseTasks = [
        { s: "বাংলা ১ম পত্র", t: "গদ্য ১–৬: বাঙ্গালার নব্য লেখকদিগের প্রতি, অপরিচিতা, সাহিত্যে খেলা, বিলাসী, অধ্যাঙ্গিনী, যৌবনের গান | উপন্যাস: লালসালু | পদ্য ১–৬: ঋতুবর্ণন..." },
        { s: "বাংলা ২য় পত্র", t: "বাংলা উচ্চারণ নিয়ম | বাংলা বানান নিয়ম | ব্যাকরণিক শব্দশ্রেণি | শব্দ গঠন" },
        { s: "English 1st", t: "Seen Comprehension (MCQ + questions) | Summarizing | Unseen Comprehension" },
        { s: "English 2nd", t: "Article | Preposition | Special words/phrases | Completing sentence" },
        { s: "ICT", t: "সংখ্যা পদ্ধতি ও ডিজিটাল ডিভাইস — Binary/Octal/Hex, Logic gates" },
        { s: "পদার্থ ১ম", t: "গতিবিদ্যা — প্রাস | ভেক্টর — ক্রস গুণফল, ডট গুণফল, নদী পারাপার" },
        { s: "রসায়ন ১ম", t: "গুণগত রসায়ন — পরমাণুর গঠন, কোয়ান্টাম সংখ্যা, দ্রাব্যতা গুণফল" },
        { s: "জীব ১ম", t: "কোষ ও এর গঠন | কোষ বিভাজন — Mitosis/Meiosis" },
        { s: "গণিত ১ম", t: "ম্যাট্রিক্স ও নির্ণায়ক | ভেক্টর" },
        { s: "Grand Revision", t: "রিভিশন: এই ১০ দিনের পড়া একসাথে রিভিউ করুন।" }
    ];

    // Subject Color Coding
    const subjColors = {
        "বাংলা ১ম পত্র": { bg: "#1e3a8a", border: "#3b82f6" },
        "বাংলা ২য় পত্র": { bg: "#312e81", border: "#6366f1" },
        "English 1st":   { bg: "#713f12", border: "#eab308" },
        "English 2nd":   { bg: "#7c2d12", border: "#f97316" },
        "ICT":           { bg: "#083344", border: "#0ea5e9" },
        "পদার্থ ১ম":     { bg: "#14532d", border: "#22c55e" },
        "রসায়ন ১ম":     { bg: "#831843", border: "#ec4899" },
        "জীব ১ম":        { bg: "#064e3b", border: "#10b981" },
        "গণিত ১ম":       { bg: "#422006", border: "#ea580c" },
        "Grand Revision":{ bg: "#4c1d95", border: "#a855f7" },
    };

    // Gamification Badges
    const BADGES = [
        { id: 'b1', name: 'Beginner', desc: '১ম দিন complete করলে', req: 1, icon: '🌱' },
        { id: 'b2', name: 'Ignited', desc: '৫ দিন complete করলে', req: 5, icon: '🔥' },
        { id: 'b3', name: 'Momentum', desc: '১০ দিন complete করলে', req: 10, icon: '⚡' },
        { id: 'b4', name: 'Deep Focus', desc: '২০ দিন complete করলে', req: 20, icon: '🧠' },
        { id: 'b5', name: 'Half Champion', desc: '২৭ দিন complete করলে', req: 27, icon: '🏆' },
        { id: 'b6', name: 'Elite Learner', desc: '৪০ দিন complete করলে', req: 40, icon: '💎' },
        { id: 'b7', name: 'Roadmap Master', desc: 'সব ৫৫ দিন complete করলে', req: 55, icon: '👑' }
    ];

    const TOTAL_DAYS = 55;
    const START_DATE = new Date(2026, 3, 24); // April 24, 2026

    // Helper: Format Date to DD/MM/YYYY
    function formatDate(dayOffset) {
        let d = new Date(START_DATE);
        d.setDate(d.getDate() + dayOffset - 1);
        let dd = String(d.getDate()).padStart(2, '0');
        let mm = String(d.getMonth() + 1).padStart(2, '0');
        let yyyy = d.getFullYear();
        return `${dd}/${mm}/${yyyy}`;
    }

    // Generate 55 Days Plan strictly preserving original content logically
    const planData = [];
    for (let i = 1; i <= TOTAL_DAYS; i++) {
        let template = baseTasks[(i - 1) % baseTasks.length]; // Loops the 10 days up to 55
        planData.push({
            d: i,
            date: formatDate(i),
            s: template.s,
            t: template.t,
            color: subjColors[template.s] || { bg: "#334155", border: "#94a3b8" }
        });
    }

    // ════════════════════════════════════════════
    // STATE MANAGEMENT (LocalStorage)
    // ════════════════════════════════════════════
    let state = JSON.parse(localStorage.getItem('hsc_roadmap_state')) || {
        checked: {},
        xp: 0,
        streak: 0,
        lastActiveDate: null,
        unlockedBadges: []
    };

    function saveState() {
        localStorage.setItem('hsc_roadmap_state', JSON.stringify(state));
    }

    // ════════════════════════════════════════════
    // UI RENDERING & LOGIC
    // ════════════════════════════════════════════

    function init() {
        checkStreak();
        renderLegend();
        renderBadges();
        renderRoadmap();
        updateDashboard();
    }

    // Check Daily Streak
    function checkStreak() {
        const todayStr = new Date().toDateString();
        if (state.lastActiveDate !== todayStr) {
            if (state.lastActiveDate) {
                let lastDate = new Date(state.lastActiveDate);
                let today = new Date(todayStr);
                let diffTime = Math.abs(today - lastDate);
                let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                if (diffDays === 1) {
                    // Valid streak continuation will happen on first action today
                } else if (diffDays > 1) {
                    state.streak = 0; // Streak broken
                }
            }
            saveState();
        }
    }

    function updateStreakAction() {
        const todayStr = new Date().toDateString();
        if (state.lastActiveDate !== todayStr) {
            state.streak++;
            state.lastActiveDate = todayStr;
            saveState();
            showToast(`🔥 Streak Updated: ${state.streak} Days!`);
        }
    }

    // Render Subject Keys
    function renderLegend() {
        const container = document.getElementById('legend-container');
        Object.keys(subjColors).forEach(subj => {
            const color = subjColors[subj];
            container.innerHTML += `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${color.border}; box-shadow: 0 0 8px ${color.border}"></div>
                    ${subj}
                </div>
            `;
        });
    }

    // Render Badges
    function renderBadges() {
        const container = document.getElementById('badges-container');
        container.innerHTML = '';
        BADGES.forEach(b => {
            const isUnlocked = state.unlockedBadges.includes(b.id);
            container.innerHTML += `
                <div class="badge-card ${isUnlocked ? 'unlocked' : ''}" data-tooltip="${b.desc}">
                    <div class="badge-icon">${b.icon}</div>
                    <div class="badge-name">${b.name}</div>
                    <div class="badge-req">${b.req} Days</div>
                </div>
            `;
        });
    }

    // Render Roadmap List
    function renderRoadmap() {
        const container = document.getElementById('roadmap-container');
        container.innerHTML = '';
        
        planData.forEach(day => {
            const isDone = state.checked[day.d];
            const card = document.createElement('div');
            card.className = `day-card ${isDone ? 'completed' : ''}`;
            card.style.borderLeftColor = isDone ? 'var(--success)' : day.color.border;
            card.onclick = (e) => toggleDay(day.d, e);
            
            card.innerHTML = `
                <div class="check-circle"></div>
                <div class="day-info">
                    <div class="day-header">
                        <span class="day-num">Day ${day.d}</span>
                        <span class="day-subj-badge" style="background: ${day.color.bg}; border: 1px solid ${day.color.border}">${day.s}</span>
                        <span class="day-date">📅 ${day.date}</span>
                    </div>
                    <div class="day-topic">${day.t}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Toggle Day Complete
    function toggleDay(dayId, event) {
        const isCurrentlyDone = state.checked[dayId];
        state.checked[dayId] = !isCurrentlyDone;
        
        if (!isCurrentlyDone) {
            // Completing a day
            state.xp += 10;
            updateStreakAction();
            spawnXPAnimation(event);
            checkNewBadges();
        } else {
            // Uncompleting a day
            state.xp = Math.max(0, state.xp - 10);
        }
        
        saveState();
        renderRoadmap();
        updateDashboard();
    }

    // Dashboard & Game Stats Updater
    function updateDashboard() {
        const doneCount = Object.values(state.checked).filter(Boolean).length;
        const pct = Math.round((doneCount / TOTAL_DAYS) * 100);
        
        // Progress Bar
        document.getElementById('dash-prog-fill').style.width = `${pct}%`;
        document.getElementById('dash-pct').textContent = pct;
        document.getElementById('stat-done').textContent = doneCount;
        document.getElementById('stat-left').textContent = TOTAL_DAYS - doneCount;
        
        // Gamification Header
        const level = Math.floor(state.xp / 50) + 1;
        const levelProgress = (state.xp % 50) / 50 * 100;
        
        document.getElementById('nav-streak').textContent = state.streak;
        document.getElementById('nav-lvl').textContent = level;
        document.getElementById('nav-xp').textContent = state.xp;
        document.getElementById('nav-lvl-fill').style.width = `${levelProgress}%`;
    }

    // Badge Unlock Logic
    function checkNewBadges() {
        const doneCount = Object.values(state.checked).filter(Boolean).length;
        let newlyUnlocked = false;
        
        BADGES.forEach(b => {
            if (doneCount >= b.req && !state.unlockedBadges.includes(b.id)) {
                state.unlockedBadges.push(b.id);
                newlyUnlocked = true;
                setTimeout(() => showToast(`🎉 New Badge Unlocked: ${b.name}! ${b.icon}`), 500);
            }
        });
        
        if(newlyUnlocked) {
            saveState();
            renderBadges();
        }
    }

    // Floating XP Animation
    function spawnXPAnimation(e) {
        const el = document.createElement('div');
        el.className = 'xp-float';
        el.textContent = '+10 XP';
        
        // Get click position or fallback to center screen
        let x = e.clientX || window.innerWidth / 2;
        let y = e.clientY || window.innerHeight / 2;
        
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1200);
    }

    // Toast Notification
    let toastTimeout;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerHTML = msg;
        t.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Start App
    init();

</script>
</body>
</html>
